<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C55"/>
      <stop offset="100%" stop-color="#E84A15"/>
    </linearGradient>
    <linearGradient id="lensG" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#C93D0A"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E84A15"/>
    </linearGradient>
  </defs>

  <!-- ─── Icon Mark ─── -->
  <rect x="0" y="10" width="140" height="140" rx="30" fill="url(#iconBg)"/>

  <!-- Camera body -->
  <rect x="18" y="52" width="104" height="72" rx="10" fill="white" fill-opacity="0.96"/>

  <!-- Camera hump -->
  <rect x="48" y="36" width="44" height="20" rx="8" fill="white" fill-opacity="0.96"/>

  <!-- Flash LED -->
  <circle cx="30" cy="62" r="5" fill="#FF6B35" fill-opacity="0.7"/>

  <!-- Lens -->
  <circle cx="70" cy="85" r="28" fill="url(#lensG)"/>
  <circle cx="70" cy="85" r="22" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Fork tines (mini) -->
  <rect x="56" y="73" width="3.5" height="12" rx="1.75" fill="white"/>
  <rect x="62" y="73" width="3.5" height="12" rx="1.75" fill="white"/>
  <rect x="68" y="73" width="3.5" height="12" rx="1.75" fill="white"/>
  <rect x="74" y="73" width="3.5" height="12" rx="1.75" fill="white"/>
  <!-- Fork neck + handle -->
  <rect x="56" y="83" width="22" height="5" rx="2.5" fill="white"/>
  <rect x="64" y="87" width="6" height="16" rx="3" fill="white"/>

  <!-- Knife -->
  <path d="M82 73 Q88 73 88 80 L88 86 L82 86 Z" fill="white" fill-opacity="0.85"/>
  <rect x="82" y="85" width="8" height="18" rx="4" fill="white" fill-opacity="0.85"/>

  <!-- Lens shine -->
  <ellipse cx="57" cy="76" rx="5" ry="3" fill="white" fill-opacity="0.35" transform="rotate(-30 57 76)"/>

  <!-- ─── Wordmark Text ─── -->

  <!-- "Snap" in bold dark -->
  <text x="158" y="108"
        font-family="'SF Pro Display', 'Helvetica Neue', 'Arial', sans-serif"
        font-size="72" font-weight="800"
        fill="#1A1A1A"
        letter-spacing="-2">Snap</text>

  <!-- "Calorie" in brand orange gradient -->
  <text x="326" y="108"
        font-family="'SF Pro Display', 'Helvetica Neue', 'Arial', sans-serif"
        font-size="72" font-weight="800"
        fill="url(#textGrad)"
        letter-spacing="-2">Calorie</text>

  <!-- Tagline -->
  <text x="158" y="132"
        font-family="'SF Pro Text', 'Helvetica Neue', 'Arial', sans-serif"
        font-size="18" font-weight="400"
        fill="#999999"
        letter-spacing="0.5">AI-powered nutrition tracker</text>
</svg>
