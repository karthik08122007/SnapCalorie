<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapCalorie Logo Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 40px; }
    h1 { font-size: 14px; font-weight: 600; color: #999; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 24px; }
    .section { background: white; border-radius: 16px; padding: 32px; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .section h2 { font-size: 12px; font-weight: 600; color: #bbb; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 20px; }
    .row { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
    .icon-box { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .icon-box span { font-size: 11px; color: #999; }
    .dark { background: #1a1a1a; border-radius: 16px; padding: 32px; }
    .dark h2 { color: #555; }
    img { display: block; }

    /* Export instructions */
    .tip { background: #fff8f5; border: 1px solid #ffe0d0; border-radius: 12px; padding: 16px 20px; margin-top: 24px; }
    .tip h3 { font-size: 13px; font-weight: 700; color: #FF6B35; margin-bottom: 8px; }
    .tip p, .tip li { font-size: 13px; color: #666; line-height: 1.7; }
    .tip ul { padding-left: 18px; }
    .tip code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>

<h1>SnapCalorie · Logo Preview</h1>

<!-- App Icon sizes -->
<div class="section">
  <h2>App Icon</h2>
  <div class="row">
    <div class="icon-box">
      <img src="logo.svg" width="180" height="180" alt="1024px icon"/>
      <span>180 × 180 (preview)</span>
    </div>
    <div class="icon-box">
      <img src="logo.svg" width="120" height="120" alt="120px"/>
      <span>120 × 120</span>
    </div>
    <div class="icon-box">
      <img src="logo.svg" width="76" height="76" alt="76px"/>
      <span>76 × 76</span>
    </div>
    <div class="icon-box">
      <img src="logo.svg" width="60" height="60" alt="60px"/>
      <span>60 × 60</span>
    </div>
    <div class="icon-box">
      <img src="logo.svg" width="40" height="40" alt="40px"/>
      <span>40 × 40</span>
    </div>
    <div class="icon-box">
      <img src="logo.svg" width="29" height="29" alt="29px"/>
      <span>29 × 29</span>
    </div>
  </div>
</div>

<!-- On dark background -->
<div class="section dark">
  <h2>On Dark Background</h2>
  <div class="row">
    <div class="icon-box">
      <img src="logo.svg" width="120" height="120" alt="icon on dark"/>
      <span style="color:#555">120 × 120</span>
    </div>
    <div class="icon-box">
      <img src="logo.svg" width="76" height="76" alt="icon on dark"/>
      <span style="color:#555">76 × 76</span>
    </div>
    <div class="icon-box">
      <img src="logo.svg" width="40" height="40" alt="icon on dark"/>
      <span style="color:#555">40 × 40</span>
    </div>
  </div>
</div>

<!-- Wordmark -->
<div class="section">
  <h2>Wordmark (Horizontal)</h2>
  <img src="wordmark.svg" width="400" height="100" alt="SnapCalorie wordmark"/>
  <br>
  <img src="wordmark.svg" width="280" height="70" alt="SnapCalorie wordmark small"/>
</div>

<!-- Wordmark on dark -->
<div class="section dark">
  <h2>Wordmark on Dark</h2>
  <img src="wordmark.svg" width="400" height="100" alt="wordmark dark"/>
</div>

<!-- Export buttons -->
<div class="tip">
  <h3>Export PNG files for the build</h3>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">
    <button onclick="exportPng('icon.png',1024)" style="background:#FF6B35;color:white;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-weight:600">icon.png (1024)</button>
    <button onclick="exportPng('android-icon-foreground.png',1024)" style="background:#FF6B35;color:white;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-weight:600">foreground.png (1024)</button>
    <button onclick="exportPng('splash-icon.png',512)" style="background:#FF6B35;color:white;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-weight:600">splash-icon.png (512)</button>
    <button onclick="exportPng('favicon.png',64)" style="background:#FF6B35;color:white;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-weight:600">favicon.png (64)</button>
    <button onclick="exportMono('android-icon-monochrome.png',192)" style="background:#333;color:white;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-weight:600">monochrome.png (192)</button>
  </div>
  <p style="font-size:12px;color:#999">After downloading, move each file to the <code>assets/</code> folder (replace existing).</p>
</div>
<canvas id="canvas" style="display:none"></canvas>
<script>
  function exportPng(filename, size) {
    const canvas = document.getElementById('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,size,size);
    const img = new Image();
    img.onload = () => { ctx.drawImage(img,0,0,size,size); dl(canvas,filename); };
    img.src = 'logo.svg';
  }
  function exportMono(filename, size) {
    const canvas = document.getElementById('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,size,size);
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img,0,0,size,size);
      const d = ctx.getImageData(0,0,size,size);
      for (let i=0;i<d.data.length;i+=4) {
        if (d.data[i+3]>10){d.data[i]=255;d.data[i+1]=255;d.data[i+2]=255;}
      }
      ctx.putImageData(d,0,0);
      dl(canvas,filename);
    };
    img.src = 'logo.svg';
  }
  function dl(canvas,filename) {
    const a = document.createElement('a');
    a.download = filename;
    a.href = canvas.toDataURL('image/png');
    a.click();
  }
</script>

</body>
</html>
